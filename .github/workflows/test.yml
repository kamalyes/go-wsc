on:
  push:
    branches:
      - master
    paths:
      - "**"
      - "!docs/**"
      - "!**.md"
  pull_request:
    paths:
      - "**"
      - "!docs/**"
      - "!**.md"

name: Test
jobs:
  Build:
    strategy:
      matrix:
        go-version: [1.21.x, 1.22.x, 1.23.x, 1.24.x, 1.25.x]
      fail-fast: false
    runs-on: ubuntu-latest
    timeout-minutes: 60

    # 🔥 全局环境变量（可通过 GitHub Variables 覆盖）
    env:
      MYSQL_ROOT_PASSWORD: ${{ vars.MYSQL_ROOT_PASSWORD || 'test_password_123' }}
      MYSQL_DATABASE: ${{ vars.MYSQL_DATABASE || 'go_wsc_test' }}
      TEST_REDIS_ADDR: ${{ vars.TEST_REDIS_ADDR || 'localhost:6379' }}
      TEST_REDIS_PASSWORD: ${{ vars.TEST_REDIS_PASSWORD || '' }}

    # 🐳 服务容器
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ${{ env.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE: ${{ env.MYSQL_DATABASE }}
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Fetch Repository
        uses: actions/checkout@v5

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ matrix.go-version }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ matrix.go-version }}-
            ${{ runner.os }}-go-

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest
        continue-on-error: true

      - name: Download dependencies
        run: go mod download
        continue-on-error: true

      - name: Test (with coverage)
        env:
          TEST_MYSQL_DSN: root:${{ env.MYSQL_ROOT_PASSWORD }}@tcp(localhost:3306)/${{ env.MYSQL_DATABASE }}?charset=utf8mb4&parseTime=True&loc=Local&timeout=60s&readTimeout=60s&writeTimeout=60s
        run: gotestsum -f testname -- ./... -race -count=1 -timeout=30m -coverprofile=coverage.txt -covermode=atomic -shuffle=on
        timeout-minutes: 60
        continue-on-error: true # 即使测试失败也继续

      - name: Check coverage file exists
        id: check_coverage
        if: matrix.go-version == '1.22.x'
        run: |
          if [ -f coverage.txt ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "✅ Coverage file exists"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "⚠️ Coverage file not found"
          fi
        shell: bash
        continue-on-error: true

      - name: Upload coverage reports to Codecov
        if: always() && steps.check_coverage.outputs.exists == 'true'
        uses: codecov/codecov-action@v5.5.3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.txt
          flags: unittests
          slug: kamalyes/go-wsc
          fail_ci_if_error: false # 上传失败不影响 CI
        continue-on-error: true # 上传失败也不影响整个流程
